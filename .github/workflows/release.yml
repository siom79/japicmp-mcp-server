name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.2)'
        required: true

jobs:
  release:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Configure git
        run: |
          git config user.name '${{ github.actor }}'
          git config user.email '${{ github.actor }}@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Compute next development version
        id: versions
        run: |
          NEXT=$(echo "${{ github.event.inputs.version }}" | awk -F. '{$NF=$NF+1; print}' OFS=.)
          echo "next=${NEXT}-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Read current version
        id: current
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Set SNAPSHOT version
        run: mvn --batch-mode versions:set -DnewVersion=${{ github.event.inputs.version }}-SNAPSHOT -DgenerateBackupPoms=false

      - name: Commit SNAPSHOT version
        run: |
          git add pom.xml
          git diff --cached --quiet || git commit -m "prepare release ${{ github.event.inputs.version }}"

      - name: Release prepare and perform
        run: |
          mvn --batch-mode release:prepare \
            -DreleaseVersion=${{ github.event.inputs.version }} \
            -Dtag=v${{ github.event.inputs.version }} \
            -DdevelopmentVersion=${{ steps.versions.outputs.next }} \
            -DlocalCheckout=true
          mvn --batch-mode release:perform \
            -DlocalCheckout=true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: target/checkout/target/japicmp-mcp-server-${{ github.event.inputs.version }}.jar

      - name: Update version references in workspace
        run: |
          OLD="${{ steps.current.outputs.version }}"
          NEW="${{ steps.versions.outputs.next }}"
          find . -type f -not -path './.git/*' -not -path './target/*' \
            | xargs grep -rl "$OLD" 2>/dev/null \
            | xargs -r sed -i "s/${OLD}/${NEW}/g"
          git add -A
          git diff --cached --quiet || git commit -m "update version references to ${NEW}"
          git push origin HEAD
